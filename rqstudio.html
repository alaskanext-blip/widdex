<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocateq Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        canvas { max-width: 100%; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .rocateq-red { color: #e11d48; }
        .bg-rocateq { background-color: #e11d48; }
        .loader { border-top-color: #e11d48; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-4xl flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-rocateq rounded-lg flex items-center justify-center font-bold text-white italic">R</div>
            <h1 class="text-2xl font-extrabold tracking-tight">ROCATEQ <span class="text-rose-500 text-sm font-normal">STUDIO</span></h1>
        </div>
        <div id="statusTag" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 border border-slate-700">Listo para editar</div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1 space-y-6">
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    Archivos Fuente
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Video (MP4/WebM)</label>
                        <input type="file" id="videoUpload" accept="video/*" class="w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-rose-500/10 file:text-rose-500 hover:file:bg-rose-500/20 cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Música (MP3/WAV)</label>
                        <input type="file" id="audioUpload" accept="audio/*" class="w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500/10 file:text-blue-500 hover:file:bg-blue-500/20 cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Personalización
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Texto Inferior (Subtítulo)</label>
                        <input type="text" id="overlayText" value="Seguridad y Control" placeholder="Ej: Seguridad y Control" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-rose-500">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Opacidad de Marcas de Agua</label>
                        <input type="range" id="logoOpacity" min="0.1" max="1" step="0.1" value="0.8" class="w-full accent-rose-500">
                    </div>
                </div>
            </div>

            <button id="exportBtn" disabled class="w-full py-4 bg-slate-700 text-slate-400 font-bold rounded-2xl cursor-not-allowed transition-all hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                Generar Video Final
            </button>
        </section>

        <section class="lg:col-span-2 space-y-4">
            <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black flex items-center justify-center border border-slate-800">
                <canvas id="editorCanvas"></canvas>
                
                <div id="processingOverlay" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
                    <p class="text-xl font-bold">Procesando Video...</p>
                    <p id="progressText" class="text-rose-500 font-mono mt-2">0%</p>
                </div>

                <div id="placeholderMsg" class="text-slate-600 text-center px-4">
                    <p class="text-4xl mb-2">🎬</p>
                    <p>Sube un video para comenzar la edición</p>
                </div>
            </div>

            <div class="flex justify-between items-center text-sm text-slate-500 px-2">
                <span>Previsualización en tiempo real</span>
                <span id="videoTime">00:00 / 00:00</span>
            </div>
        </section>
    </main>

    <!-- Hidden Elements for Processing -->
    <video id="sourceVideo" class="hidden"></video>
    <audio id="sourceAudio" class="hidden"></audio>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const video = document.getElementById('sourceVideo');
        const audio = document.getElementById('sourceAudio');
        const videoInput = document.getElementById('videoUpload');
        const audioInput = document.getElementById('audioUpload');
        const textInput = document.getElementById('overlayText');
        const exportBtn = document.getElementById('exportBtn');
        const processingOverlay = document.getElementById('processingOverlay');
        const progressText = document.getElementById('progressText');
        const placeholderMsg = document.getElementById('placeholderMsg');
        const logoOpacity = document.getElementById('logoOpacity');
        const videoTimeDisplay = document.getElementById('videoTime');

        let isVideoLoaded = false;
        const BRAND_URL = "www.rocateq.com";

        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                video.load();
                placeholderMsg.classList.add('hidden');
            }
        });

        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                audio.src = URL.createObjectURL(file);
                audio.load();
            }
        });

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            isVideoLoaded = true;
            exportBtn.disabled = false;
            exportBtn.classList.remove('bg-slate-700', 'text-slate-400', 'cursor-not-allowed');
            exportBtn.classList.add('bg-rose-600', 'text-white');
            drawPreview();
        };

        function drawFrame() {
            // Dibujar el video de fondo
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const opacity = parseFloat(logoOpacity.value);
            const padding = canvas.width * 0.03;
            
            // 1. Marca de agua superior derecha (Permanente: www.rocateq.com)
            const watermarkSize = canvas.height * 0.04;
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.font = `bold ${watermarkSize}px Inter, sans-serif`;
            ctx.textAlign = 'right';
            
            // Sombra suave para el texto superior
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = 'white';
            ctx.fillText(BRAND_URL, canvas.width - padding, padding + watermarkSize);
            ctx.restore();

            // 2. Texto inferior personalizable
            const text = textInput.value;
            if (text) {
                const fontSize = canvas.height * 0.06;
                ctx.font = `bold ${fontSize}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                
                // Franja de legibilidad inferior
                const rectHeight = fontSize * 1.6;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, canvas.height - rectHeight, canvas.width, rectHeight);
                
                // Texto principal
                ctx.fillStyle = 'white';
                ctx.fillText(text, canvas.width / 2, canvas.height - (rectHeight / 2) + (fontSize / 3));
            }
        }

        function drawPreview() {
            if (!video.paused || video.currentTime >= 0) {
                drawFrame();
                updateTimeDisplay();
                if (!video.paused) requestAnimationFrame(drawPreview);
            }
        }

        function updateTimeDisplay() {
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            videoTimeDisplay.textContent = `${current} / ${total}`;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        exportBtn.onclick = async () => {
            if (!isVideoLoaded) return;

            processingOverlay.classList.remove('hidden');
            exportBtn.disabled = true;

            const stream = canvas.captureStream(30); // 30 FPS
            
            // Mix audio if present
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            
            if (audio.src) {
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(dest);
                source.connect(audioCtx.destination);
            }

            const tracks = [...stream.getVideoTracks()];
            if (audio.src) {
                tracks.push(...dest.stream.getAudioTracks());
            }

            const combinedStream = new MediaStream(tracks);
            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];

            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Rocateq_Video_${Date.now()}.webm`;
                a.click();
                
                processingOverlay.classList.add('hidden');
                exportBtn.disabled = false;
                video.pause();
                video.currentTime = 0;
            };

            // Start processing
            video.currentTime = 0;
            if (audio.src) {
                audio.currentTime = 0;
                audio.play();
            }
            video.play();
            recorder.start();

            // Progress tracking
            const interval = setInterval(() => {
                const progress = Math.min(Math.round((video.currentTime / video.duration) * 100), 100);
                progressText.textContent = `${progress}%`;
                
                drawFrame();

                if (video.ended || video.currentTime >= video.duration) {
                    recorder.stop();
                    audio.pause();
                    clearInterval(interval);
                }
            }, 33); // Sync with ~30fps
        };

        // UI Listeners for immediate preview update
        textInput.oninput = drawFrame;
        logoOpacity.oninput = drawFrame;

    </script>
</body>
</html>
